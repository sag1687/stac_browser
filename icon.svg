<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#0f172a" stroke="#34d399" stroke-width="2"/>
  <!-- Earth / globe -->
  <circle cx="32" cy="32" r="16" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
  <!-- Latitude lines -->
  <ellipse cx="32" cy="32" rx="16" ry="6" fill="none" stroke="#3b82f6" stroke-width="1"/>
  <!-- Vertical meridian -->
  <line x1="32" y1="16" x2="32" y2="48" stroke="#3b82f6" stroke-width="1"/>
  <!-- Satellite dish / orbit arc -->
  <path d="M 14 20 Q 32 6 50 20" fill="none" stroke="#34d399" stroke-width="2" stroke-dasharray="4 2"/>
  <!-- Satellite body -->
  <rect x="44" y="10" width="10" height="7" rx="2" fill="#34d399"/>
  <!-- Solar panels -->
  <rect x="38" y="12" width="6" height="3" rx="1" fill="#60a5fa"/>
  <rect x="54" y="12" width="6" height="3" rx="1" fill="#60a5fa"/>
  <!-- Signal dot to earth -->
  <circle cx="32" cy="32" r="2.5" fill="#f59e0b"/>
  <line x1="46" y1="15" x2="34" y2="30" stroke="#f59e0b" stroke-width="1" stroke-dasharray="2 2"/>
</svg>
